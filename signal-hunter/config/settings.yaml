# Signal Hunter Default Pipeline Configuration

app_name: "Signal Hunter"
log_level: "INFO"

collectors:
  arxiv:
    enabled: true
    sources:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
    cron: "0 8 * * *"
    params:
      max_results: 50
  tech_blogs:
    enabled: true
    sources:
      - "https://openai.com/blog"
      - "https://deepmind.google/discover"
      - "https://netflixtechblog.com"
    cron: "0 9 * * *"
    params:
      request_timeout: 10
  github_trending:
    enabled: true
    sources:
      - "python"
      - "typescript"
      - "go"
    cron: "0 10 * * *"
    params:
      min_stars: 100

analyzers:
  gemini_summarizer:
    enabled: true
    model_name: "gemini-3.5-flash"
    temperature: 0.1
    max_tokens: 1500
  opportunity_scout:
    enabled: true
    model_name: "gemini-3.1-pro-preview"
    temperature: 0.3
    max_tokens: 2000
  nvidia_analyzer:
    enabled: true
    model_name: "meta/llama-3.1-70b-instruct"
    temperature: 0.1
    max_tokens: 1500

verifier:
  min_confidence_score: 0.75
  strict_mode: true

memory:
  storage_dir: "data"
  backup_enabled: true

delivery:
  channels:
    - "console"
    - "markdown_file"
  output_dir: "reports"
